<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoChat & Games - التطبيق الرسمي</title>
    <!-- ethers.js للمحفظة والعقد الذكي -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <!-- مكتبات Firebase للقسم العام السريع والمجاني -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0e11; color: #eaecef; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* شاشة الدخول المبدئية */
        .login-container { text-align: center; background: #151a21; padding: 40px 30px; border-radius: 16px; border: 1px solid #f3ba2f; max-width: 400px; width: 90%; display: block; }
        .logo { font-size: 2.5rem; font-weight: bold; color: #f3ba2f; margin-bottom: 10px; }
        .tagline { color: #90baee; font-size: 0.95rem; margin-bottom: 30px; }
        .btn-connect { background-color: #f3ba2f; color: #000000; border: none; padding: 14px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-connect:hover { background-color: #fdd05b; }
        
        /* الهيكل الأساسي للتطبيق */
        .chat-container { display: none; width: 100%; height: 100vh; grid-template-columns: 320px 1fr; }
        .sidebar { background-color: #151a21; border-left: 1px solid #212833; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-header { padding: 20px; background-color: #1e2530; font-weight: bold; border-bottom: 1px solid #212833; color: #f3ba2f; text-align: center; }
        .wallet-list { list-style: none; }
        .wallet-item { padding: 15px 20px; border-bottom: 1px solid #1e2530; font-size: 0.85rem; color: #ffffff; text-align: center; font-weight: bold; }
        
        .sidebar-games-box { padding: 12px; background: #1e2530; border-bottom: 1px solid #212833; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-games-box label { font-size: 0.85rem; color: #f3ba2f; text-align: center; font-weight: bold; margin-bottom: 2px; }
        .btn-game { background-color: #212833; color: #ffffff; border: 1px solid #4f5d73; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: 0.2s; text-align: center; }
        .btn-game:hover { background-color: #2b3542; border-color: #f3ba2f; color: #f3ba2f; }

        .sidebar-deposit-box { padding: 15px; background: #1e2530; border-top: 1px solid #212833; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-deposit-box label { font-size: 0.85rem; color: #00ff88; text-align: center; font-weight: bold; }
        .sidebar-deposit-box input { background: #0b0e11; border: 1px solid #2b3542; padding: 10px; border-radius: 6px; color: white; text-align: center; outline: none; font-size: 1rem; }
        .sidebar-deposit-box button { background: linear-gradient(135deg, #00ff88 0%, #00bc62 100%); color: black; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        
        .btn-buy-sinu { background: linear-gradient(135deg, #ff007a 0%, #7928ca 100%); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 0.95rem; text-align: center; transition: 0.2s; text-decoration: none; display: block; }

        .main-chat { display: flex; flex-direction: column; background-color: #0b0e11; width: 100%; height: 100%; overflow: hidden; }
        
        .navigation-tabs { display: flex; background: #151a21; border-bottom: 1px solid #212833; }
        .tab-btn { flex: 1; padding: 18px; background: none; border: none; color: #b7bdc6; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center; font-size: 0.95rem; }
        .tab-btn.active { color: #f3ba2f; background: #1e2530; border-bottom: 4px solid #f3ba2f; }

        .chat-header { padding: 12px 20px; background-color: #151a21; border-bottom: 1px solid #212833; font-size: 0.9rem; color: #ffffff; line-height: 1.5; }
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; display: flex; flex-direction: column; gap: 5px; line-height: 1.4; position: relative; }
        .message.sent { background-color: #f3ba2f; color: #000000; align-self: flex-start; border-top-right-radius: 0; }
        .message.received { background-color: #1e2530; color: #eaecef; align-self: flex-end; border-top-left-radius: 0; }
        
        .input-area-wrapper { background-color: #151a21; display: flex; flex-direction: column; padding: 12px 15px; gap: 8px; border-top: 1px solid #212833; }
        .recipient-row { display: none; align-items: center; gap: 10px; background: #1e2530; padding: 10px 12px; border-radius: 6px; border: 1px solid #2b3542; }
        .recipient-row label { font-size: 0.85rem; color: #f3ba2f; white-space: nowrap; font-weight: bold; }
        .recipient-row input { flex: 1; background-color: #0b0e11; border: 1px solid #2b3542; padding: 8px 12px; border-radius: 4px; color: #ffffff; font-size: 0.85rem; outline: none; }
        
        .input-area { display: flex; gap: 8px; width: 100%; align-items: center; }
        .input-area input { flex: 1; background-color: #212833; border: 1px solid #2b3542; padding: 12px; border-radius: 8px; color: #ffffff; outline: none; font-size: 0.95rem; }
        
        .media-actions { display: flex; gap: 5px; }
        .btn-media { background-color: #2b3542; color: #ffffff; border: 1px solid #4f5d73; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; width: 42px; height: 42px; }
        .btn-media input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; top: 0; left: 0; }
        
        .btn-send { background-color: #f3ba2f; color: #000000; border: none; padding: 0 20px; height: 42px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.95rem; }

        /* 📱 تعديل استجابة الموبايل: إظهار الأزرار أفقياً بنجاح وإضافة زر الربط والاسم */
        @media (max-width: 768px) {
            .chat-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
            
            .sidebar { 
                display: flex !important; 
                flex-direction: row !important; 
                width: 100% !important; 
                height: auto !important; 
                max-height: 60px;
                border-left: none; 
                border-bottom: 2px solid #212833;
                overflow-x: auto !important;
                overflow-y: hidden !important;
                white-space: nowrap;
                padding: 6px 10px;
                gap: 10px;
                background-color: #151a21;
                align-items: center;
                z-index: 999;
            }
            .sidebar-header, .wallet-list { display: none !important; } 
            
            /* أزرار مخصصة للهاتف تظهر في بداية الشريط */
            .mobile-wallet-btn { display: inline-block !important; background-color: #f3ba2f; color: black; border: none; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; border-radius: 6px; height: 36px; cursor: pointer; white-space: nowrap; }
            .mobile-wallet-label { display: none; color: #00ff88; font-size: 0.8rem; font-weight: bold; padding: 6px; background: #212833; border-radius: 6px; height: 36px; line-height: 24px; border: 1px solid #00ff88; }

            .sidebar-games-box { flex-direction: row !important; padding: 0; border-bottom: none; gap: 6px; background: transparent; }
            .sidebar-games-box label { display: none !important; }
            
            .sidebar-deposit-box { flex-direction: row !important; padding: 0; border-top: none; gap: 6px; background: transparent; }
            .sidebar-deposit-box label { display: none !important; }
            
            .sidebar-deposit-box input { width: 70px !important; padding: 6px !important; font-size: 0.85rem; height: 36px; }
            .sidebar-deposit-box button { padding: 6px 12px !important; font-size: 0.8rem; height: 36px; white-space: nowrap; }
            .btn-buy-sinu { padding: 6px 12px !important; font-size: 0.8rem; height: 36px; line-height: 24px; white-space: nowrap; }
            .btn-game { padding: 6px 12px !important; font-size: 0.8rem; height: 36px; white-space: nowrap; }
            
            .main-chat { flex: 1; height: calc(100vh - 60px); }
        }

        /* إخفاء أزرار الموبايل الافتراضية على الكمبيوتر */
        .mobile-wallet-btn, .mobile-wallet-label { display: none; }
    </style>
</head>
<body>

    <!-- تم تعديل المنطق البرمجي: إذا دخل المستخدم مباشرة، لن تعيقه شاشة القفل وتظهر واجهة الشات فوراً -->
    <div class="login-container" id="loginScreen" style="display: none;">
        <div class="logo">CryptoChat</div>
        <div class="tagline">تراسل يدعمه عقد عملة SINU وقاعدة بيانات تتيح تعديل وحذف منشوراتك العامة</div>
        <button class="btn-connect" onclick="connectWallet()">ربط المحفظة الحقيقية</button>
    </div>

    <!-- واجهة التطبيق الرئيسية تعمل مباشرة -->
    <div class="chat-container" id="chatScreen" style="display: flex;">
        <div class="sidebar">
            <!-- أزرار المحفظة الذكية الخاصة بالموبايل تظهر كأول عنصر الآن -->
            <button class="mobile-wallet-btn" id="mobileWalletBtn" onclick="connectWallet()">🔗 ربط المحفظة</button>
            <div class="mobile-wallet-label" id="mobileWalletLabel">0x...</div>

            <div class="sidebar-header">المحفظة النشطة</div>
            <ul class="wallet-list">
                <li class="wallet-item" id="activeWalletLabel">لم يتم الربط ❌</li>
            </ul>
            
            <div class="sidebar-deposit-box">
                <input type="number" id="depositAmount" placeholder="الكمية" min="1" value="100">
                <button onclick="handleUIDeposit()">تعبئة الرصيد 🚀</button>
                
                <a href="https://app.uniswap.org/#/swap?outputCurrency=0x56bB247c424958948B63de291A0C7f45d8651B76" target="_blank" class="btn-buy-sinu">
                    💳 شراء SINU
                </a>
            </div>

            <div class="sidebar-games-box">
                <button class="btn-game" onclick="playGame('luck')">🎰 الحظ (قريباً)</button>
                <button class="btn-game" onclick="playGame('prediction')">📈 التوقعات</button>
                <button class="btn-game" onclick="playGame('mafia')">🕵️‍♂️ مافيا</button>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="navigation-tabs">
                <button class="tab-btn active" id="tabGroup" onclick="switchChatMode('group')">المنشورات العامة 🌐 (تعديل ومسح)</button>
                <button class="tab-btn" id="tabPrivate" onclick="switchChatMode('private')">المراسلة الخاصة 🔒 (خصم عبر العقد)</button>
            </div>

            <div class="chat-header" id="chatHeader">المحادثة النشطة | جاري تحميل البيانات...</div>
            <div class="messages-area" id="messagesArea"></div>
            
            <div class="input-area-wrapper">
                <div class="recipient-row" id="recipientRow">
                    <label for="recipientAddress">المستلم:</label>
                    <input type="text" id="recipientAddress" placeholder="أدخل عنوان المحفظة (0x...)">
                </div>
                
                <div class="input-area">
                    <div class="media-actions">
                        <button class="btn-media" title="رفع صورة">
                            🖼️
                            <input type="file" id="imageUploader" accept="image/*" onchange="handleLocalFileChange(this, 2)">
                        </button>
                    </div>
                    
                    <input type="text" id="messageInput" placeholder="اكتب رسالة أو منشور هنا...">
                    <button class="btn-send" onclick="sendMessage(1)">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAjANzHrD-JEEN_4DVIY705ECcJTvl4lQk",
            authDomain: "kriptochat-bf77a.firebaseapp.com",
            databaseURL: "https://kriptochat-bf77a-default-rtdb.firebaseio.com", 
            projectId: "kriptochat-bf77a",
            storageBucket: "kriptochat-bf77a.firebasestorage.app",
            messagingSenderId: "438561797154",
            appId: "1:438561797154:web:26e5b2eda081e0eac2467b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const chatContractAddress = "0x690192AEeE16c40f6f7d0CA30BAA1B0884259068"; 
        const sinuTokenAddress = "0x56bB247c424958948B63de291A0C7f45d8651B76"; 

        const chatAbi = [
            "function costImage() view returns (uint256)",
            "function costText() view returns (uint256)",
            "function costVoice() view returns (uint256)",
            "function deductForService(address _user, uint256 _serviceType)",
            "function depositSinu(uint256 _amountWithDecimals)",
            "function getInAppBalance(address _user) view returns (uint256)"
        ];

        const tokenAbi = [
            "function approve(address spender, uint256 amount) external returns (bool)",
            "function balanceOf(address account) view returns (uint256)"
        ];

        let provider, signer, chatContract, tokenContract, userAddress;
        let inAppBalance = 0;
        let isGroupChat = true; 

        let priceText = 300; 
        let priceImage = 500;
        let priceVoice = 1000;

        // فحص الاتصال التلقائي وتظبيط وضع الشاشة هندسياً
        window.addEventListener('load', async () => {
            adjustLayout();
            if (typeof window.ethereum !== 'undefined') {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    connectWallet();
                }
            }
            listenToPublicMessages();
            updateHeaderDisplay();
        });

        window.addEventListener('resize', adjustLayout);

        function adjustLayout() {
            const chatScreen = document.getElementById('chatScreen');
            if(window.innerWidth > 768) {
                chatScreen.style.display = 'grid';
            } else {
                chatScreen.style.display = 'flex';
            }
        }

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];

                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();

                    chatContract = new ethers.Contract(chatContractAddress, chatAbi, signer);
                    tokenContract = new ethers.Contract(sinuTokenAddress, tokenAbi, signer);

                    const shortAddr = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
                    
                    // تحديث العناوين على الكمبيوتر والموبايل
                    document.getElementById('activeWalletLabel').innerText = shortAddr;
                    
                    const mBtn = document.getElementById('mobileWalletBtn');
                    const mLabel = document.getElementById('mobileWalletLabel');
                    if(mBtn && mLabel) {
                        mBtn.style.display = 'none';
                        mLabel.style.display = 'inline-block';
                        mLabel.innerText = `👤 ${shortAddr}`;
                    }

                    await refreshUserData();
                    updateHeaderDisplay();
                } catch (error) {
                    console.error(error);
                    alert("فشل ربط البيانات: " + error.message);
                }
            } else {
                alert("يرجى فتح التطبيق من داخل متصفح محفظة العملات المعتمدة (مثل Trust Wallet أو MetaMask)!");
            }
        }

        async function refreshUserData() {
            if (!chatContract || !userAddress) return;
            try {
                const rawBalance = await chatContract.getInAppBalance(userAddress);
                inAppBalance = parseInt(rawBalance.toString());

                const cText = await chatContract.costText();
                const cImage = await chatContract.costImage();
                
                priceText = parseFloat(ethers.utils.formatEther(cText));
                priceImage = parseFloat(ethers.utils.formatEther(cImage));
            } catch (err) {
                console.error("خطأ قراءة أسعار الرصيد: ", err);
            }
            updateHeaderDisplay();
        }

        function listenToPublicMessages() {
            document.getElementById('messagesArea').innerHTML = ""; 
            db.ref("public_messages").off();
            
            db.ref("public_messages").on("child_added", (snapshot) => {
                const data = snapshot.val();
                const isMe = userAddress ? data.sender.toLowerCase() === userAddress.toLowerCase() : false;
                displayMessageInUI(data.type, data.content, isMe, data.sender, true, snapshot.key);
            });

            db.ref("public_messages").on("child_changed", (snapshot) => {
                const data = snapshot.val();
                const isMe = userAddress ? data.sender.toLowerCase() === userAddress.toLowerCase() : false;
                displayMessageInUI(data.type, data.content, isMe, data.sender, true, snapshot.key);
            });

            db.ref("public_messages").on("child_removed", (snapshot) => {
                displayMessageInUI(null, null, false, "", true, snapshot.key);
            });
        }

        async function handleUIDeposit() {
            if (!tokenContract || !chatContract) {
                return alert("⚠️ يرجى الضغط على زر '🔗 ربط المحفظة' الموجود أول شريط الأزرار العلوي قبل الشحن!");
            }

            const amountInput = document.getElementById('depositAmount');
            const val = amountInput.value.trim();
            if(!val || parseFloat(val) <= 0) return alert("يرجى كتابة كمية شحن صالحة!");
            
            try {
                const amountWei = ethers.utils.parseEther(val);
                const approveTx = await tokenContract.approve(chatContractAddress, amountWei);
                await approveTx.wait();
                
                const depositTx = await chatContract.depositSinu(amountWei);
                await depositTx.wait();
                
                alert("تم شحن الرصيد بنجاح! 🎉");
                await refreshUserData();
            } catch (error) {
                alert("فشلت عملية الإيداع: " + error.message);
            }
        }

        function switchChatMode(mode) {
            isGroupChat = (mode === 'group');
            const recipientRow = document.getElementById('recipientRow');
            document.getElementById('messagesArea').innerHTML = ""; 
            
            if (isGroupChat) {
                document.getElementById('tabGroup').classList.add('active');
                document.getElementById('tabPrivate').classList.remove('active');
                recipientRow.style.display = 'none'; 
                listenToPublicMessages(); 
            } else {
                document.getElementById('tabGroup').classList.remove('active');
                document.getElementById('tabPrivate').classList.add('active');
                recipientRow.style.display = 'flex'; 
                db.ref("public_messages").off(); 
                displayMessageInUI(1, "أنت الآن في قسم الرسائل الخاصة الآمنة، سيتم الخصم من رصيدك في العقد تلقائياً عند الإرسال.", false, "نظام الحماية", false);
            }
            updateHeaderDisplay();
        }

        function updateHeaderDisplay() {
            const header = document.getElementById('chatHeader');
            if (!header) return;
            
            if (isGroupChat) {
                header.innerHTML = `المنشورات العامة 🌐 | <span style="color: #00ff88; font-weight: bold;">تعديل ومسح منشوراتك متاح</span> | رصيدك: ${inAppBalance} SINU`;
            } else {
                header.innerHTML = `المراسلة الخاصة 🔒 | رصيدك: <span style="color:#00ff88; font-weight:bold;">${inAppBalance} SINU</span><br>
                <small style="color:#f3ba2f; font-weight: bold;">نص ${priceText} | صورة ${priceImage} SINU</small>`;
            }
        }

        function handleLocalFileChange(inputElement, serviceType) {
            if (!isGroupChat) {
                const recipientInput = document.getElementById('recipientAddress');
                const recipient = recipientInput.value.trim();
                if (recipient === "" || !recipient.startsWith("0x") || recipient.length !== 42) {
                    inputElement.value = "";
                    return alert("يرجى كتابة عنوان محفظة المستلم أولاً!");
                }
            }

            const file = inputElement.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                sendMessage(serviceType, e.target.result);
                inputElement.value = ""; 
            };
            reader.readAsDataURL(file);
        }

        // --- دالة شحن الرصيد الجديدة ---
async function depositFunds(amountToDeposit) {
    try {
        if (!chatContract) return alert("يرجى ربط المحفظة أولاً");

        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();

        const sinuTokenAddress = "0x56bB247c424958948B63de291A0C7f45dB651B76"; 
        const erc20ABI = [
            "function allowance(address owner, address spender) view returns (uint256)",
            "function approve(address spender, uint256 amount) returns (bool)"
        ];
        const sinuContract = new ethers.Contract(sinuTokenAddress, erc20ABI, signer);
        const amountWei = ethers.utils.parseUnits(amountToDeposit.toString(), 18);

        const allowance = await sinuContract.allowance(userAddress, chatContract.address);
        if (allowance.lt(amountWei)) {
            alert("يرجى الموافقة على صلاحية سحب التوكن في محفظتك أولاً...");
            const approveTx = await sinuContract.approve(chatContract.address, ethers.constants.MaxUint256);
            await approveTx.wait();
        }

        alert("يرجى تأكيد معاملة الشحن ودفع الغاز (لمرة واحدة فقط)...");
        const tx = await chatContract.depositSinu(amountWei);
        await tx.wait();

        // تحديث الرصيد في قاعدة البيانات Firebase بعد نجاح الشحن على البلوكشين
        const userRef = db.ref(`users/${userAddress}`);
        const snapshot = await userRef.once('value');
        let currentBalance = snapshot.val()?.balance || 0;
        
        // إضافة القيمة الجديدة للرصيد القديم
        currentBalance += parseFloat(amountToDeposit);
        await userRef.update({ balance: currentBalance });
        
        inAppBalance = currentBalance;
        updateHeaderDisplay();

        alert("🎉 تم شحن رصيدك بنجاح! يمكنك الآن المراسلة مجاناً وبدون غاز.");

    } catch (e) {
        console.error(e);
        alert("فشلت عملية الشحن:\n" + (e.message || JSON.stringify(e)));
    }
}


        async function sendMessage(serviceType = 1, mediaData = "") { 
            if (!chatContract) return alert("يرجى ربط محفظتك أولاً عبر زر '🔗 ربط المحفظة' في الأعلى.");
            
            const input = document.getElementById('messageInput');
            const recipientInput = document.getElementById('recipientAddress');
            let text = serviceType === 1 ? input.value.trim() : mediaData;

            if (text === "") return;

            if (isGroupChat) {
                db.ref("public_messages").push({
                    sender: userAddress,
                    content: text,
                    type: serviceType,
                    timestamp: Date.now()
                });
                if (serviceType === 1) input.value = "";
            } else {
                const recipient = recipientInput.value.trim();
                if (recipient === "" || !recipient.startsWith("0x") || recipient.length !== 42) {
                    return alert("يرجى إدخال عنوان محفظة مستلم صحيح!");
                }

                let currentCost = parseFloat(priceText);
                if (serviceType === 2) currentCost = parseFloat(priceImage);

                if (inAppBalance < currentCost) {
                    alert(`رصيدك غير كافٍ! تحتاج إلى ${currentCost} SINU.`);
                    return;
                }

                        try {
            // 1. جلب رصيد المستخدم المشحون داخل التطبيق من الـ Firebase
            const userRef = db.ref(`users/${userAddress}`);
            const snapshot = await userRef.once('value');
            let currentBalance = snapshot.val()?.balance || 0;

            if (currentBalance < currentCost) {
                alert(`رصيدك المشحون غير كافٍ! تحتاج إلى ${currentCost} SINU. يرجى شحن رصيدك من القائمة الجانبية.`);
                return;
            }

            // 2. الخصم داخلياً من قاعدة البيانات فوراً (مجاناً وبدون محفظة!)
            currentBalance -= currentCost;
            await userRef.update({ balance: currentBalance });

            // 3. حفظ الرسالة الخاصة في Firebase لتظهر فوراً
            const recipient = recipientInput.value.trim();
            await db.ref("private_messages").push({
                sender: userAddress,
                recipient: recipient,
                content: text,
                type: serviceType,
                timestamp: Date.now()
            });

            // 4. تحديث الرصيد المعروض في الواجهة
            inAppBalance = currentBalance;
            if (typeof updateHeaderDisplay === "function") {
                updateHeaderDisplay();
            }

            displayMessageInUI(serviceType, text, true, userAddress, false);
            if (serviceType === 1) input.value = "";

        } catch (e) {
            console.error("خطأ أثناء الإرسال:", e);
            alert("حدث خطأ أثناء إرسال الرسالة: " + e.message);
        }



            }
        }

        function displayMessageInUI(serviceType, content, isSent, senderAddress, isPublicMsg, messageId = null) {
            const area = document.getElementById('messagesArea');
            if (!area) return;
            
            if (!content && messageId) {
                const existingMsg = document.getElementById(`msg-${messageId}`);
                if (existingMsg) existingMsg.remove();
                return;
            }

            let msgDiv = document.getElementById(`msg-${messageId}`);
            let isEdit = false;
            
            if (msgDiv) {
                msgDiv.innerHTML = ""; 
                isEdit = true;
            } else {
                msgDiv = document.createElement('div');
                if (messageId) msgDiv.id = `msg-${messageId}`;
            }

            msgDiv.className = isSent ? 'message sent' : 'message received';
            msgDiv.style.borderLeft = isPublicMsg ? "4px solid #00ff88" : "4px solid #f3ba2f";
            
            let shortSender = senderAddress;
            if(senderAddress && senderAddress.startsWith("0x")) {
                shortSender = senderAddress.substring(0, 6) + "..." + senderAddress.substring(38);
            }
            
            const headerSpan = document.createElement('div');
            headerSpan.style.cssText = "display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 4px; gap: 10px;";
            
            const titleSpan = document.createElement('small');
            titleSpan.style.cssText = "color:#aaa; font-weight:bold; font-size:0.75rem;";
            titleSpan.innerText = isPublicMsg ? `🌐 منشور عام من: ${shortSender}` : `🔒 رسالة خاصة`;
            headerSpan.appendChild(titleSpan);

            if (isPublicMsg && isSent && messageId && serviceType === 1) {
                const controlsDiv = document.createElement('div');
                controlsDiv.style.cssText = "display: flex; gap: 5px;";

                const editBtn = document.createElement('button');
                editBtn.innerText = "✏️";
                editBtn.style.cssText = "background: none; border: none; cursor: pointer; font-size: 0.8rem;";
                editBtn.onclick = () => editPublicMessage(messageId, content);

                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = "❌";
                deleteBtn.style.cssText = "background: none; border: none; cursor: pointer; font-size: 0.8rem;";
                deleteBtn.onclick = () => deletePublicMessage(messageId);

                controlsDiv.appendChild(editBtn);
                controlsDiv.appendChild(deleteBtn);
                headerSpan.appendChild(controlsDiv);
            }

            msgDiv.appendChild(headerSpan);

            if (serviceType === 1) {
                const textContainer = document.createElement('span');
                textContainer.innerText = content;
                msgDiv.appendChild(textContainer);
            } else if (serviceType === 2) {
                const img = document.createElement('img');
                img.src = content;
                img.style.cssText = "max-width:100%; border-radius:8px; margin-top:5px;";
                msgDiv.appendChild(img);
            }

            if (!isEdit) {
                area.appendChild(msgDiv);
            }
            area.scrollTop = area.scrollHeight;
        }

        async function editPublicMessage(messageId, oldContent) {
            const newContent = prompt("قم بتعديل منشورك:", oldContent);
            if (!newContent || newContent.trim() === "" || newContent.trim() === oldContent) return;

            try {
                await db.ref(`public_messages/${messageId}`).update({
                    content: newContent.trim(),
                    timestamp: Date.now()
                });
                alert("تم تعديل المنشور بنجاح! ✨");
            } catch (err) {
                alert("فشل التعديل: خطأ في الصلاحيات.");
            }
        }
       async function deletePublicMessage(messageId) {
    if (!confirm("هل أنت متأكد من رغبتك في حذف هذا المنشور نهائياً؟")) return;

    try {
        await db.ref(`public_messages/${messageId}`).remove();
        alert("تم حذف المنشور بنجاح 🗑️");
    } catch (err) {
        console.error(err);
        alert("فشل التعديل: خطأ في الصلاحيات");
    }
}

        // 1. الدالة المربوطة بالزر في الـ HTML لقرأة القيمة من الحقل
async function handleUIDeposit() {
    const amountInput = document.getElementById("depositAmount");
    const amount = amountInput.value.trim();

    if (!amount || isNaN(amount) || parseFloat(amount) <= 0) {
        alert("يرجى إدخال كمية صحيحة من توكنز SINU للشحن.");
        return;
    }

    // استدعاء دالة الشحن الأساسية وتمرير القيمة لها
    await depositFunds(parseFloat(amount));
    
    // تفريغ الحقل بعد نجاح العملية
    amountInput.value = "";
}

// 2. دالة شحن الرصيد الأساسية عبر العقد الذكي وتحديث Firebase
async function depositFunds(amountToDeposit) {
    try {
        if (!chatContract) return alert("يرجى ربط المحفظة أولاً");

        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();

        const sinuTokenAddress = "0x56bB247c424958948B63de291A0C7f45dB651B76"; 
        const erc20ABI = [
            "function allowance(address owner, address spender) view returns (uint256)",
            "function approve(address spender, uint256 amount) returns (bool)"
        ];
        const sinuContract = new ethers.Contract(sinuTokenAddress, erc20ABI, signer);
        const amountWei = ethers.utils.parseUnits(amountToDeposit.toString(), 18);

        // فحص وتفعيل الصلاحية (Allowance)
        const allowance = await sinuContract.allowance(userAddress, chatContract.address);
        if (allowance.lt(amountWei)) {
            alert("يرجى الموافقة على صلاحية سحب التوكن في محفظتك أولاً...");
            const approveTx = await sinuContract.approve(chatContract.address, ethers.constants.MaxUint256);
            await approveTx.wait();
        }

        alert("يرجى تأكيد معاملة الشحن ودفع الغاز في المحفظة (لمرة واحدة فقط)...");
        const tx = await chatContract.depositSinu(amountWei);
        await tx.wait();

        // تحديث الرصيد في قاعدة البيانات Firebase بعد نجاح الشحن على البلوكشين
        const userRef = db.ref(`users/${userAddress}`);
        const snapshot = await userRef.once('value');
        let currentBalance = snapshot.val()?.balance || 0;
        
        currentBalance += parseFloat(amountToDeposit);
        await userRef.update({ balance: currentBalance });
        
        inAppBalance = currentBalance;
        if (typeof updateHeaderDisplay === "function") {
            updateHeaderDisplay();
        }

        alert("🎉 تم شحن رصيدك بنجاح! يمكنك الآن المراسلة مجاناً وبدون غاز.");

    } catch (e) {
        console.error(e);
        alert("فشلت عملية الشحن:\n" + (e.message || JSON.stringify(e)));
    }
}
