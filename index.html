<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoChat - التطبيق الرسمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0e11; color: #eaecef; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .login-container { text-align: center; background: #151a21; padding: 40px 30px; border-radius: 16px; border: 1px solid #f3ba2f; max-width: 400px; width: 90%; }
        .logo { font-size: 2.5rem; font-weight: bold; color: #f3ba2f; margin-bottom: 10px; }
        .logo span { color: #ffffff; }
        .tagline { color: #90baee; font-size: 0.95rem; margin-bottom: 30px; }
        .btn-connect { background-color: #f3ba2f; color: #000000; border: none; padding: 14px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-connect:hover { background-color: #fdd05b; }
        
        /* شاشة الشات */
        .chat-container { display: none; width: 100%; height: 100vh; grid-template-columns: 350px 1fr; }
        .sidebar { background-color: #151a21; border-left: 1px solid #212833; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background-color: #1e2530; font-weight: bold; border-bottom: 1px solid #212833; color: #f3ba2f; }
        .wallet-list { list-style: none; overflow-y: auto; flex: 1; }
        .wallet-item { padding: 15px 20px; border-bottom: 1px solid #1e2530; cursor: pointer; font-size: 0.85rem; color: #b7bdc6; }
        .wallet-item.active { background-color: #212833; color: #ffffff; border-right: 4px solid #f3ba2f; }
        
        /* أزرار التحكم في الأقسام */
        .navigation-tabs { display: flex; background: #151a21; border-bottom: 1px solid #212833; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #b7bdc6; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center; }
        .tab-btn.active { color: #f3ba2f; background: #1e2530; border-bottom: 3px solid #f3ba2f; }

        .main-chat { display: flex; flex-direction: column; background-color: #0b0e11; width: 100%; }
        .chat-header { padding: 15px 20px; background-color: #151a21; border-bottom: 1px solid #212833; font-size: 0.9rem; color: #ffffff; }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* تصميم الرسائل وفقاعات العرض المتطورة للوسائط */
        .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; display: flex; flex-direction: column; gap: 5px; }
        .message.sent { background-color: #f3ba2f; color: #000000; align-self: flex-start; border-top-right-radius: 0; }
        .message.received { background-color: #1e2530; color: #eaecef; align-self: flex-end; border-top-left-radius: 0; }
        .message img { max-width: 100%; border-radius: 8px; margin-top: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .message audio { max-width: 100%; margin-top: 5px; outline: none; }
        
        /* منطقة الإدخال المطورة مع خيارات الوسائط المتعددة (صور وأصوات) */
        .input-area-wrapper { background-color: #151a21; display: flex; flex-direction: column; padding: 15px 20px; gap: 8px; border-top: 1px solid #212833; }
        .recipient-row { display: none; align-items: center; gap: 10px; background: #1e2530; padding: 8px 12px; border-radius: 6px; border: 1px solid #2b3542; }
        .recipient-row label { font-size: 0.85rem; color: #f3ba2f; white-space: nowrap; font-weight: bold; }
        .recipient-row input { flex: 1; background-color: #0b0e11; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; color: #ffffff; font-size: 0.85rem; outline: none; }
        
        .input-area { display: flex; gap: 10px; width: 100%; align-items: center; }
        .input-area input { flex: 1; background-color: #212833; border: 1px solid #2b3542; padding: 12px; border-radius: 8px; color: #ffffff; outline: none; }
        
        /* أزرار المرفقات المتطورة */
        .media-actions { display: flex; gap: 6px; }
        .btn-media { background-color: #2b3542; color: #ffffff; border: 1px solid #4f5d73; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-media:hover { background-color: #3e4d5f; border-color: #f3ba2f; }
        .btn-send { background-color: #f3ba2f; color: #000000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* صندوق الشحن السريع بالواجهة */
        .deposit-box { padding: 15px; background: #1e2530; border-top: 1px solid #212833; display: flex; flex-direction: column; gap: 8px; }
        .deposit-box input { background: #0b0e11; border: 1px solid #2b3542; padding: 8px; border-radius: 6px; color: white; text-align: center; outline: none; }
        .deposit-box button { background: #00ff88; color: black; border: none; padding: 8px; font-weight: bold; border-radius: 6px; cursor: pointer; }

        @media (max-width: 768px) { .chat-container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <div class="logo">Crypto<span>Chat</span></div>
        <div class="tagline">تراسل آمن وجاد يدعمه عقد عملة SINU الذكي</div>
        <button class="btn-connect" onclick="connectWallet()">ربط المحفظة الحقيقية</button>
    </div>

    <div class="chat-container" id="chatScreen">
        <div class="sidebar">
            <div class="sidebar-header">المحفظة المتصلة حالياً</div>
            <ul class="wallet-list">
                <li class="wallet-item active" id="activeWalletLabel">0x...</li>
            </ul>
            
            <div class="deposit-box">
                <label style="font-size: 0.8rem; color: #b7bdc6; text-align: center; font-weight: bold; color: #00ff88;">📥 اشحن رصيد التطبيق (لتجنب الغاز في كل رسالة)</label>
                <input type="number" id="depositAmount" placeholder="الكمية بـ SINU" min="1">
                <button onclick="handleUIDeposit()">إيداع وشحن فوري 🚀</button>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="navigation-tabs">
                <button class="tab-btn active" id="tabGroup" onclick="switchChatMode('group')">الدردشة الجماعية 🌐</button>
                <button class="tab-btn" id="tabPrivate" onclick="switchChatMode('private')">المراسلة الخاصة 🔒</button>
            </div>

            <div class="chat-header" id="chatHeader">المحادثة النشطة | رصيدك: جاري التحميل...</div>
            <div class="messages-area" id="messagesArea">
                <div class="message received">مرحباً بك! يمكنك الآن إرسال النصوص 💬، الصور 🖼️، والمقاطع الصوتية 🎙️ بكل سهولة.</div>
            </div>
            
            <div class="input-area-wrapper">
                <div class="recipient-row" id="recipientRow">
                    <label for="recipientAddress">المستلم (To):</label>
                    <input type="text" id="recipientAddress" placeholder="أدخل عنوان محفظة الطرف الآخر (0x...)">
                </div>
                <div class="input-area">
                    <div class="media-actions">
                        <button class="btn-media" title="إرسال صورة" onclick="sendMediaPrompt(2)">🖼️</button>
                        <button class="btn-media" title="إرسال رسالة صوتية" onclick="sendMediaPrompt(3)">🎙️</button>
                    </div>
                    <input type="text" id="messageInput" placeholder="اكتب رسالة نصية هنا...">
                    <button class="btn-send" onclick="sendMessage(1)">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContractAddress = "0x690192AEeE16c40f6f7d0CA30BAA1B0884259068"; 
        const sinuTokenAddress = "0x56bB247c424958948B63de291A0C7f45d8651B76"; 

        const chatAbi = [
            "constructor(address _sinuTokenAddress)",
            "function costImage() view returns (uint256)",
            "function costText() view returns (uint256)",
            "function costVoice() view returns (uint256)",
            "function deductForService(address _user, uint256 _serviceType)",
            "function depositSinu(uint256 _amountWithDecimals)",
            "function getInAppBalance(address _user) view returns (uint256)",
            "function updatePrices(uint256 _textWei, uint256 _imageWei, uint256 _voiceWei)"
        ];

        const tokenAbi = [
            "function approve(address spender, uint256 amount) external returns (bool)",
            "function balanceOf(address account) view returns (uint256)"
        ];

        let provider, signer, chatContract, tokenContract, userAddress;
        let inAppBalance = 0;
        let isGroupChat = true; 

        let priceText = 3; 
        let priceImage = 5;
        let priceVoice = 10;

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];

                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();

                    chatContract = new ethers.Contract(chatContractAddress, chatAbi, signer);
                    tokenContract = new ethers.Contract(sinuTokenAddress, tokenAbi, signer);

                    document.getElementById('activeWalletLabel').innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);

                    await refreshUserData();

                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('chatScreen').style.display = 'grid';
                    
                    updateHeaderDisplay();
                } catch (error) {
                    console.error(error);
                    alert("فشل جلب البيانات من العقد الذكي: " + error.message);
                }
            } else {
                alert("يرجى فتح الموقع من متصفح محفظة الكريبتو الحقيقية!");
            }
        }

        async function refreshUserData() {
            try {
                const rawBalance = await chatContract.getInAppBalance(userAddress);
                inAppBalance = parseFloat(ethers.utils.formatEther(rawBalance));

                const cText = await chatContract.costText();
                const cImage = await chatContract.costImage();
                const cVoice = await chatContract.costVoice();
                
                priceText = parseFloat(ethers.utils.formatEther(cText));
                priceImage = parseFloat(ethers.utils.formatEther(cImage));
                priceVoice = parseFloat(ethers.utils.formatEther(cVoice));
            } catch (err) {
                console.error("خطأ في تحديث البيانات الفعلي: ", err);
            }
            updateHeaderDisplay();
        }

        async function handleUIDeposit() {
            const amountInput = document.getElementById('depositAmount');
            const val = amountInput.value.trim();
            if(!val || parseFloat(val) <= 0) return alert("يرجى إدخال كمية شحن صحيحة!");
            
            try {
                const amountWei = ethers.utils.parseEther(val);
                const approveTx = await tokenContract.approve(chatContractAddress, amountWei);
                await approveTx.wait();
                
                const depositTx = await chatContract.depositSinu(amountWei);
                await depositTx.wait();
                
                alert("تم الشحن والإيداع بنجاح! 🎉");
                amountInput.value = "";
                await refreshUserData();
            } catch (error) {
                alert("فشلت المعاملة: " + error.message);
            }
        }

        function switchChatMode(mode) {
            isGroupChat = (mode === 'group');
            const recipientRow = document.getElementById('recipientRow');
            
            if (isGroupChat) {
                document.getElementById('tabGroup').classList.add('active');
                document.getElementById('tabPrivate').classList.remove('active');
                recipientRow.style.display = 'none';
            } else {
                document.getElementById('tabGroup').classList.remove('active');
                document.getElementById('tabPrivate').classList.add('active');
                recipientRow.style.display = 'flex';
            }
            updateHeaderDisplay();
        }

        function updateHeaderDisplay() {
            const header = document.getElementById('chatHeader');
            if (!header) return;
            
            if (isGroupChat) {
                header.innerHTML = `الدردشة الجماعية العامة | <span style="color: #00ff88;">مجانية تماماً 🌐</span> | رصيدك المشحون: ${inAppBalance} SINU`;
            } else {
                header.innerHTML = `المراسلة الخاصة 🔒 | رصيدك المشحون داخل العقد: <span style="color:#00ff88; font-weight:bold;">${inAppBalance} SINU</span><br>
                <small style="color:#aaa;">تكلفة الخدمة الحالية: نص ${priceText} | صورة ${priceImage} | صوت ${priceVoice} SINU</small>`;
            }
        }

        // نافذة منبثقة مخصصة لطلب رابط الصورة أو المقطع الصوتي من المستخدم
        function sendMediaPrompt(serviceType) {
            if (!isGroupChat) {
                const recipientInput = document.getElementById('recipientAddress');
                const recipient = recipientInput.value.trim();
                if (recipient === "" || !recipient.startsWith("0x") || recipient.length !== 42) {
                    return alert("يرجى كتابة عنوان محفظة المستلم (0x...) بشكل صحيح أولاً قبل إرسال الوسائط!");
                }
            }

            if (serviceType === 2) {
                const url = prompt("يرجى إدخال رابط الصورة المباشر (URL):");
                if (url) sendMessage(2, url);
            } else if (serviceType === 3) {
                const url = prompt("يرجى إدخال رابط الملف الصوتي المباشر (mp3, wav):");
                if (url) sendMessage(3, url);
            }
        }

        function sendMessage(serviceType = 1, mediaUrl = "") { 
            const input = document.getElementById('messageInput');
            const recipientInput = document.getElementById('recipientAddress');
            let text = serviceType === 1 ? input.value.trim() : mediaUrl;

            if (text === "") return;

            if (!isGroupChat) {
                let currentCost = parseFloat(priceText);
                if (serviceType === 2) currentCost = parseFloat(priceImage);
                if (serviceType === 3) currentCost = parseFloat(priceVoice);

                // الفحص والتحقق من الرصيد المتوفر للخدمة المطلوبة
                if (inAppBalance < currentCost) {
                    alert(`رصيدك المودع في المنصة غير كافٍ! تحتاج إلى ${currentCost} SINU لإرسال هذه الوسائط. رصيدك الحالي هو ${inAppBalance} SINU.`);
                    return;
                }
                
                inAppBalance -= currentCost;
                updateHeaderDisplay();
            }

            const area = document.getElementById('messagesArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message sent';
            
            // إدارة تنسيق الترويسة للرسائل الخاصة الموجهة لمحفظة معينة
            if (!isGroupChat) {
                msgDiv.style.borderLeft = "3px solid #f3ba2f";
                const shortTarget = recipientInput.value.substring(0, 6) + "..." + recipientInput.value.substring(38);
                const titleSpan = document.createElement('small');
                titleSpan.style.cssText = "color:#f3ba2f; display:block; margin-bottom:4px; font-weight:bold;";
                titleSpan.innerText = `🔒 رسالة خاصة إلى: ${shortTarget}`;
                msgDiv.appendChild(titleSpan);
            }

            // بناء المحتوى ديناميكياً حسب نوع الخدمة (نص، صورة، صوت)
            if (serviceType === 1) {
                const textNode = document.createTextNode(text);
                msgDiv.appendChild(textNode);
            } else if (serviceType === 2) {
                const img = document.createElement('img');
                img.src = text;
                img.alt = "صورة مرسلة";
                msgDiv.appendChild(img);
            } else if (serviceType === 3) {
                const audio = document.createElement('audio');
                audio.src = text;
                audio.controls = true;
                msgDiv.appendChild(audio);
            }

            area.appendChild(msgDiv);
            if (serviceType === 1) input.value = "";
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
