<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoChat - التطبيق الرسمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0e11; color: #eaecef; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .login-container { text-align: center; background: #151a21; padding: 40px 30px; border-radius: 16px; border: 1px solid #f3ba2f; max-width: 400px; width: 90%; }
        .logo { font-size: 2.5rem; font-weight: bold; color: #f3ba2f; margin-bottom: 10px; }
        .logo span { color: #ffffff; }
        .tagline { color: #90baee; font-size: 0.95rem; margin-bottom: 30px; }
        .btn-connect { background-color: #f3ba2f; color: #000000; border: none; padding: 14px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-connect:hover { background-color: #fdd05b; }
        
        /* شاشة الشات */
        .chat-container { display: none; width: 100%; height: 100vh; grid-template-columns: 350px 1fr; }
        .sidebar { background-color: #151a21; border-left: 1px solid #212833; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background-color: #1e2530; font-weight: bold; border-bottom: 1px solid #212833; color: #f3ba2f; }
        .wallet-list { list-style: none; overflow-y: auto; flex: 1; }
        .wallet-item { padding: 15px 20px; border-bottom: 1px solid #1e2530; cursor: pointer; font-size: 0.85rem; color: #b7bdc6; }
        .wallet-item.active { background-color: #212833; color: #ffffff; border-right: 4px solid #f3ba2f; }
        .main-chat { display: flex; flex-direction: column; background-color: #0b0e11; }
        .chat-header { padding: 15px 20px; background-color: #151a21; border-bottom: 1px solid #212833; font-size: 0.9rem; color: #ffffff; }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; }
        .message.sent { background-color: #f3ba2f; color: #000000; align-self: flex-start; border-top-right-radius: 0; }
        .message.received { background-color: #1e2530; color: #eaecef; align-self: flex-end; border-top-left-radius: 0; }
        .input-area { padding: 15px 20px; background-color: #151a21; display: flex; gap: 10px; }
        .input-area input { flex: 1; background-color: #212833; border: 1px solid #2b3542; padding: 12px; border-radius: 8px; color: #ffffff; outline: none; }
        .input-area button { background-color: #f3ba2f; color: #000000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 768px) { .chat-container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <div class="logo">Crypto<span>Chat</span></div>
        <div class="tagline">تراسل آمن وجاد يدعمه عقد عملة SINU الذكي</div>
        <button class="btn-connect" onclick="connectWallet()">ربط المحفظة الحقيقية</button>
    </div>

    <div class="chat-container" id="chatScreen">
        <div class="sidebar">
            <div class="sidebar-header">المحادثات النشطة</div>
            <ul class="wallet-list">
                <li class="wallet-item active">0x71C...497a (محادثة مشفرة)</li>
            </ul>
        </div>
        <div class="main-chat">
            <div class="chat-header" id="chatHeader">المحادثة النشطة | رصيدك: جاري التحميل...</div>
            <div class="messages-area" id="messagesArea">
                <div class="message received">مرحباً بك! كل رسالة ترسلها هنا ستخصم 30 SINU من رصيدك المودع في العقد الذكي.</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="اكتب رسالة مشفرة...">
                <button onclick="sendMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        
        // ==========================================
// 1. الإعدادات وعناوين العقود الذكية على شبكة Base
// ==========================================
// تنبيه: ضع عنوان العقد الجديد الذي ظهر لك في Remix بعد الـ Deploy مكان هذا العنوان
const chatContractAddress = "0x690192AEeE16c40f6f7d0CA30BAA1B0884259068"; 
const sinuTokenAddress = "0x56bB247c424958948B63de291A0C7f45d8651B76"; // عنوان عملتك الحقيقي والنهائي

// الـ ABI المطابق لـ الـ JSON الخاص بك بنسبة 100%
const chatAbi = [
    "constructor(address _sinuTokenAddress)",
    "error InsufficientChatBalance()",
    "error InsufficientWalletBalance()",
    "error NoEarnings()",
    "error OwnableInvalidOwner(address owner)",
    "error OwnableUnauthorizedAccount(address account)",
    "error ReentrancyGuardReentrantCall()",
    "error TransferFailed()",
    "error UnknownService()",
    "error ZeroAmount()",
    "event EarningsWithdrawn(address indexed owner, uint256 amount)",
    "event OwnershipTransferred(address indexed previousOwner, address indexed newOwner)",
    "event PricesUpdated(uint256 newTextCost, uint256 newImageCost, uint256 newVoiceCost)",
    "event ServiceDeducted(address indexed user, string serviceType, uint256 amount)",
    "event SinuDeposited(address indexed user, uint256 amount)",
    "function costImage() view returns (uint256)",
    "function costText() view returns (uint256)",
    "function costVoice() view returns (uint256)",
    "function deductForService(address _user, uint256 _serviceType)",
    "function depositSinu(uint256 _amountWithDecimals)",
    "function getInAppBalance(address _user) view returns (uint256)",
    "function owner() view returns (uint256)",
    "function renounceOwnership()",
    "function sinuToken() view returns (address)",
    "function totalOwnerEarnings() view returns (uint256)",
    "function transferOwnership(address newOwner)",
    "function updatePrices(uint256 _textWei, uint256 _imageWei, uint256 _voiceWei)",
    "function withdrawEarnings()"
];

// ABI العملة الأساسي لعملية الموافقة والسحب الشحن
const tokenAbi = [
    "function approve(address spender, uint256 amount) external returns (bool)",
    "function balanceOf(address account) view returns (uint256)"
];

let provider, signer, chatContract, tokenContract, userAddress;
let inAppBalance = 0;
let isGroupChat = true; // الوضع الافتراضي: شات عام ومجاني

// الأسعار الافتراضية (تُحدث تلقائياً من البلوكشين فور الاتصال)
let priceText = 300;
let priceImage = 500;
let priceVoice = 1000;

// ==========================================
// 2. دوال ربط المحفظة وقراءة بيانات البلوكشين الحقيقية
// ==========================================
async function connectWallet() {
    if (typeof window.ethereum !== 'undefined') {
        try {
            // طلب إذن الاتصال بمحفظة المستخدم
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];

            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();

            // ربط العقود ذكياً بالواجهة الخلفية للمتصفح
            chatContract = new ethers.Contract(chatContractAddress, chatAbi, signer);
            tokenContract = new ethers.Contract(sinuTokenAddress, tokenAbi, signer);

            // جلب البيانات الأساسية من شبكة Base الحقيقية
            await refreshUserData();

            // إخفاء شاشة تسجيل الدخول وإظهار الشات الفخم
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'grid';
            
            updateHeaderDisplay();
        } catch (error) {
            console.error(error);
            alert("فشل جلب البيانات من العقد الذكي: " + error.message);
        }
    } else {
        alert("يرجى فتح الموقع من متصفح محفظة الكريبتو الحقيقية (DApp Browser) الخاصة بك!");
    }
}

// دالة لتحديث الأرصدة والأسعار دورياً
async function refreshUserData() {
    try {
        // 1. جلب رصيد الشحن الداخلي للمستخدم من العقد (الذي يقسم تلقائياً على 10^18 في العقد)
        const rawBalance = await chatContract.getInAppBalance(userAddress);
        inAppBalance = rawBalance.toNumber();

        // 2. جلب قيم الأسعار الحقيقية المخزنة بالعقد وتحويلها من Wei إلى Ether عادي
        const cText = await chatContract.costText();
        const cImage = await chatContract.costImage();
        const cVoice = await chatContract.costVoice();
        
        priceText = ethers.utils.formatEther(cText);
        priceImage = ethers.utils.formatEther(cImage);
        priceVoice = ethers.utils.formatEther(cVoice);
    } catch (err) {
        console.error("خطأ في تحديث البيانات: ", err);
    }
}

// ==========================================
// 3. دالة شحن رصيد التطبيق الحقيقية (depositSinu)
// ==========================================
async function depositTokens(amountTokens) {
    if (!chatContract) return alert("الرجاء ربط المحفظة أولاً!");
    try {
        // تحويل الرقم المدخل إلى صيغة Wei (إضافة 18 صفراً تلقائياً)
        const amountWei = ethers.utils.parseEther(amountTokens.toString());
        
        showLoading(true); // تشغيل مؤشر الانتظار

        // الخطوة الأولى: عمل موافقة (Approve) لعقد الشات بالتصرف بالعملات
        const approveTx = await tokenContract.approve(chatContractAddress, amountWei);
        await approveTx.wait(); // انتظار تأكيد المعاملة الأولى
        
        // الخطوة الثانية: الإيداع الفعلي بداخل العقد الذكي للشات
        const depositTx = await chatContract.depositSinu(amountWei);
        await depositTx.wait(); // انتظار تأكيد المعاملة الثانية على شبكة Base
        
        alert("تم شحن رصيد المنصة الحقيقي بنجاح تام! 🎉");
        await refreshUserData();
        updateHeaderDisplay();
    } catch (error) {
        console.error(error);
        alert("فشلت عملية الإيداع الحقيقية: " + error.message);
    } finally {
        showLoading(false);
    }
}

// ==========================================
// 4. منطق إدارة الشات والواجهات (UI Logic)
// ==========================================
function switchChatMode(mode) {
    isGroupChat = (mode === 'group');
    updateHeaderDisplay();
}

function updateHeaderDisplay() {
    const header = document.getElementById('chatHeader');
    if (!header) return;
    
    if (isGroupChat) {
        header.innerHTML = `الدردشة الجماعية العامة | <span style="color: #00ff88;">مجانية تماماً 🌐</span> | رصيدك المشحون: ${inAppBalance} SINU`;
    } else {
        header.innerHTML = `المراسلة الخاصة 🔒 | <span style="color: #f3ba2f;">تكلفة النص: ${priceText} SINU</span> | رصيدك المشحون: ${inAppBalance} SINU`;
    }
}

function sendMessage(serviceType = 1) { // 1=نص، 2=صورة، 3=صوت
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    const area = document.getElementById('messagesArea');

    if (text === "" && serviceType === 1) return;

    if (!isGroupChat) {
        let currentCost = parseFloat(priceText);
        if (serviceType === 2) currentCost = parseFloat(priceImage);
        if (serviceType === 3) currentCost = parseFloat(priceVoice);

        if (inAppBalance < currentCost) {
            alert(`رصيدك غير كافٍ! لإرسال هذه الرسالة الخاصة تحتاج إلى ${currentCost} SINU.`);
            return;
        }
        
        // الخصم الفوري محلياً من الواجهة (السيرفر يقوم به حقيقياً لاحقاً)
        inAppBalance -= currentCost;
        updateHeaderDisplay();
    }

    // عرض الرسالة بالواجهة بشكل منسق
    const msgDiv = document.createElement('div');
    msgDiv.className = isGroupChat ? 'message sent public' : 'message sent private';
    
    if (serviceType === 1) {
        msgDiv.innerText = text;
    } else if (serviceType === 2) {
        msgDiv.innerHTML = `<img src="${text}" style="max-width: 220px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">`;
    } else if (serviceType === 3) {
        msgDiv.innerHTML = `<audio controls src="${text}"></audio>`;
    }

    area.appendChild(msgDiv);
    input.value = "";
    area.scrollTop = area.scrollHeight;
}

// دالة مساعدة لإظهار مؤشر شحن وهمي/حقيقي أثناء الإيداع
function showLoading(status) {
    // يمكنك ربطها بـ Spinner في الـ CSS الخاص بك إذا أردت
    console.log(status ? "جاري تنفيذ المعاملة على البلوكشين..." : "انتهت المعاملة.");
}

        
    </script>
</body>
</html>
